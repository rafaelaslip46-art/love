<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minha Ana 💖</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;

    background:
    radial-gradient(circle at center,
    #2b0015 0%,
    #000000 70%);
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    touch-action:manipulation;
}

.page{
    position:absolute;

    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    padding:30px;

    transition:1.5s;
}

.hidden{
    opacity:0;
    pointer-events:none;
}

.title{

    font-size:clamp(42px,9vw,90px);

    color:#ff77aa;

    text-align:center;

    text-shadow:
    0 0 10px #ff77aa,
    0 0 20px #ff77aa,
    0 0 40px #ff0055,
    0 0 80px #ff0055;

    animation:pulse 2s infinite alternate;
}

.subtitle{

    margin-top:25px;

    font-size:clamp(18px,4vw,30px);

    color:#ffd1dc;

    text-align:center;

    line-height:1.7;

    width:min(90%,850px);

    text-shadow:
    0 0 10px #ff77aa;
}

.button{

    margin-top:50px;

    padding:18px 38px;

    border:none;
    border-radius:50px;

    background:#ff0055;

    color:white;

    font-size:clamp(16px,4vw,24px);

    cursor:pointer;

    box-shadow:
    0 0 20px #ff0055,
    0 0 40px #ff0055,
    0 0 80px #ff0055;

    transition:0.4s;
}

.button:hover{
    transform:scale(1.08);
}

canvas{
    position:absolute;
    inset:0;
}

.heart-text{

    position:absolute;

    font-size:clamp(12px,2.7vw,22px);

    font-weight:bold;

    white-space:nowrap;

    color:#ff69a0;

    text-shadow:
    0 0 5px #ff69a0,
    0 0 10px #ff69a0,
    0 0 20px #ff69a0,
    0 0 40px #ff0055;
}

.signature{

    position:absolute;

    top:25px;

    text-align:center;

    width:100%;

    color:white;

    font-size:clamp(14px,3vw,20px);

    text-shadow:
    0 0 10px #ff77aa;
}

@keyframes pulse{

    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.05);
    }
}

</style>
</head>

<body>

<audio id="music" loop>
    <source src="Me Leva (Acústico) - Delacruz (youtube).mp3" type="audio/mp3">
</audio>

<div class="page" id="introPage">

    <div class="title">
        MINHA ANA 💖
    </div>

    <div class="subtitle">

        Quero perder o medo aos poucos ao seu lado...

        <br><br>

        Porque com você eu me sinto segura,
        acolhida e em paz.

        <br><br>

        Quero me entregar sem medo de me decepcionar,
        porque você faz meu coração acreditar novamente ✨

    </div>

    <button class="button" onclick="startLove()">

        Entrar no meu coração 💕

    </button>

</div>

<div class="page hidden" id="heartPage">

    <div class="signature">

        Feito com amor para Ana 💖

    </div>

    <canvas id="canvas"></canvas>

</div>

<script>

const introPage = document.getElementById("introPage");
const heartPage = document.getElementById("heartPage");
const music = document.getElementById("music");

function startLove(){

    introPage.classList.add("hidden");

    setTimeout(()=>{

        heartPage.classList.remove("hidden");

        texts.forEach(span=>{
            span.style.display = "block";
        });

    },1200);

    music.play();
}

const phrases = [

    "I love you",
    "Eu te amo",
    "Te amo",
    "Je t’aime",
    "Ti amo",
    "Ich liebe dich",
    "愛してる",
    "사랑해",
    "我爱你",
    "Я тебя люблю",
    "Seni seviyorum",
    "Mahal kita",
    "Jag älskar dig",
    "Ana, eu te amo 💖"

];

const total = 90;

const texts = [];

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resize();

window.addEventListener("resize",resize);

const offsetX = ()=>window.innerWidth / 2;
const offsetY = ()=>window.innerHeight / 2 - 40;

const scale = ()=>Math.min(
    window.innerWidth,
    window.innerHeight
) / 30;

for(let i = 0; i < total; i++){

    const span = document.createElement("span");

    span.className = "heart-text";

    span.innerText = phrases[i % phrases.length];

    span.style.display = "none";

    document.body.appendChild(span);

    texts.push(span);
}

function animateHeart(){

    const t = Date.now() / 1000;

    const rotation = t * 0.18;

    texts.forEach((span,i)=>{

        const angle =
        (i / total) * Math.PI * 2 + rotation;

        const x =
        16 * Math.pow(Math.sin(angle),3);

        const y =
        13 * Math.cos(angle)
        - 5 * Math.cos(2 * angle)
        - 2 * Math.cos(3 * angle)
        - Math.cos(4 * angle);

        span.style.left =
        offsetX() + x * scale() + "px";

        span.style.top =
        offsetY() - y * scale() + "px";
    });

    requestAnimationFrame(animateHeart);
}

animateHeart();

</script>

</body>
</html>
